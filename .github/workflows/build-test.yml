name: Build and Test

on:
  push:
    branches:
      - main
      - upgrade/kymnis-platform-foundation
      - launch-readiness-operational-lead-capture
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test:
    name: Typecheck lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_SITE_URL: https://etersolis.com
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: preview-only
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline
      - name: Check
        run: npm run check
      - name: Deploy dry run
        run: npm run deploy:dry-run
