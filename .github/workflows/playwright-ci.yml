name: Playwright Smoke Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'playwright.config.ts'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'playwright.config.ts'
      - '.github/workflows/**'

jobs:
  smoke:
    runs-on: ubuntu-latest
    concurrency:
      group: playwright-smoke-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache .next
        uses: actions/cache@v4
        with:
          path: .next/.cache
          key: ${{ runner.os }}-next-cache-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-next-cache-

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Build
        run: npm run build

      - name: Start server
        run: npm run start -- -H 127.0.0.1 -p 3100 &

      - name: Wait for server
        uses: jakejarvis/wait-action@v0.2.0
        with:
          url: 'http://127.0.0.1:3100'
          timeout: '120'

      - name: Run Playwright smoke tests
        run: npx playwright test --reporter=list

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3
      - name: Cleanup node_modules
        if: always()
        run: rm -rf node_modules
