name: Playwright Visual Regression

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/**'

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run Playwright visual tests
        run: |
          npx playwright test tests/e2e/visual.spec.ts --config=playwright.config.ts --reporter=list
          # Capture HTML+PNG previews
          npx playwright test tests/e2e/capture-previews.spec.ts --config=playwright.config.ts --reporter=list
      - name: Upload Playwright report and previews
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results
            previews
        # Note: Baseline snapshots are committed under `tests/e2e/*-snapshots`.
