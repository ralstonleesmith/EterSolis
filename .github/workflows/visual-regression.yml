name: Playwright Visual Regression

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'docs/**'
      - 'public/media/**'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.ts'
      - 'next.config.mjs'
      - 'Dockerfile'
      - 'server.js'
      - 'README.md'
      - '.github/workflows/**'

jobs:
  preview-capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_SITE_URL: https://etersolis.com
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: preview-only
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline
      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium
      - name: Capture generated previews
        run: npm run preview:capture -- --reporter=list
      - name: Upload previews and Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-previews
          path: |
            previews/generated/**
            test-results/**
            playwright-report/**
          retention-days: 7
